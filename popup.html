<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Review Queue</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="header-left">
      <svg class="logo" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" fill="currentColor"/>
        <path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" fill="currentColor"/>
        <path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" fill="currentColor"/>
        <path d="M6 9v6M18 15V9a6 6 0 0 0-6-6H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="title">Review Queue</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.73-.07-1.08l2.32-1.82c.21-.16.27-.45.13-.68l-2.2-3.81c-.13-.23-.42-.31-.65-.23l-2.73 1.1c-.57-.44-1.18-.8-1.85-1.07L14.16 2.1c-.04-.26-.27-.46-.54-.46h-4.4c-.27 0-.5.2-.54.46l-.41 2.81c-.67.27-1.28.63-1.85 1.07l-2.73-1.1c-.24-.09-.52 0-.65.23L1.24 9.92c-.14.23-.08.52.13.68l2.32 1.82c-.04.35-.07.7-.07 1.08s.03.73.07 1.08L1.37 16.4c-.21.16-.27.45-.13.68l2.2 3.81c.13.23.42.31.65.23l2.73-1.1c.57.44 1.18.8 1.85 1.07l.41 2.81c.04.26.27.46.54.46h4.4c.27 0 .5-.2.54-.46l.41-2.81c.67-.27 1.28-.63 1.85-1.07l2.73 1.1c.24.09.52 0 .65-.23l2.2-3.81c.14-.23.08-.52-.13-.68l-2.32-1.82Z"/>
        </svg>
      </button>
      <label class="toggle" title="Enable or disable auto-grouping">
        <input type="checkbox" id="enableToggle" />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-field">
      <label class="field-label" for="tokenInput">GitHub Personal Access Token</label>
      <input type="password" id="tokenInput" class="token-input" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
      <p class="hint">Classic PAT with <strong>repo</strong> scope required for private repos. <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR+Review+Queue" target="_blank" id="tokenLink">Create one</a></p>
    </div>
    <div class="settings-actions">
      <span id="tokenFeedback" class="token-feedback"></span>
      <button id="clearTokenBtn" class="btn-secondary">Clear</button>
      <button id="saveTokenBtn" class="btn-primary">Save &amp; Sync</button>
    </div>
  </div>

  <div id="syncBar" class="sync-bar hidden">
    <span id="syncStatus" class="sync-status"></span>
    <button id="syncNowBtn" class="sync-now-btn" title="Sync now">
      <svg id="syncIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>

  <div id="content">
    <div id="loading" class="state-message">Loading…</div>

    <div id="setup" class="state-message hidden">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 7h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2" stroke-linecap="round"/>
        <path d="M12 2v6M9 5l3-3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="15" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <p>Connect GitHub</p>
      <p class="hint">Add a token so your PRs sync automatically</p>
      <button id="openSettingsBtn" class="btn-primary" style="margin-top:10px">Add Token</button>
    </div>

    <div id="empty" class="state-message hidden">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="9"/>
      </svg>
      <p>All caught up!</p>
      <p class="hint">No open PRs requiring your attention</p>
    </div>

    <div id="error-msg" class="state-message hidden">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4M12 16h.01" stroke-linecap="round"/>
      </svg>
      <p>Sync failed</p>
      <p id="errorDetail" class="hint"></p>
    </div>

    <div id="disabled-msg" class="state-message hidden">
      <p>Auto-grouping is disabled</p>
      <p class="hint">Toggle the switch above to re-enable</p>
    </div>

    <ul id="pr-list" class="pr-list hidden"></ul>
  </div>


  <script src="popup.js"></script>
</body>
</html>
